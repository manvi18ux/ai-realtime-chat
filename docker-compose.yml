version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: chat-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/chat_app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=5000
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: chat-client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
